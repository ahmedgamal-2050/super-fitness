<div class="flex flex-col items-center text-center justify-between  overflowx-hidden overflowy-scroll">
  <p class="text-white font-medium text-3xl my-3 text-center">1/6</p>

  <!-- Content -->
  <div class="relative z-10 flex flex-col items-center px-5 text-center my-6">
    <!-- Title -->
    <lib-auth-main-header mainHeader="Tell Us About Yourself!"></lib-auth-main-header>

    <!-- Subtitle -->
    <lib-auth-second-header seconHeader="We Need To Know Your Gender"></lib-auth-second-header>
    <!-- Gender Buttons -->
    <div class="mt-3 flex flex-col items-center gap-8">
      <!-- Male -->
      <button (click)="selectGender('male')"
        class="w-32 h-32 rounded-full border flex flex-col items-center justify-center transition-all duration-300"
        [class]="
    gender === 'male'
      ? 'bg-orange-600 border-orange-600 text-white'
      : 'bg-transparent border-white text-white'
  ">
        <lucide-icon [img]="icons.Mars" class="w-6 h-6"></lucide-icon>

        <span class="mt-2 font-semibold">Male</span>
      </button>

      <!-- Female -->
      <button (click)="selectGender('female')"
        class="w-32 h-32 rounded-full border flex flex-col items-center justify-center transition-all duration-300"
        [class]="
    gender === 'female'
      ? 'bg-orange-600 border-orange-600 text-white'
      : 'bg-transparent border-white text-white'
  ">
        <lucide-icon [img]="icons.Venus" class="w-6 h-6"></lucide-icon>

        <span class="mt-2 font-semibold">Female</span>
      </button>
    </div>

    <!-- i will replace the button with the reusable btn that mayar make it  -->
  </div>
  <!-- Next + Back -->
  <div class="flex items-center gap-3 w-3/4 m-auto">
    <button type="button" (click)="backClicked.emit()"
      class="w-10 h-10 shrink-0 flex items-center justify-center rounded-full border border-white text-white hover:bg-white/10 transition-colors">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </button>
    <sf-button variant="primary" label="Next" type="submit" class="flex-1" [disabled]="!gender"
      (click)="loginClicked.emit(gender!)" />
  </div>
</div>
