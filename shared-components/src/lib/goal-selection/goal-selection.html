<section class="text-center age w-[80%] mx-auto flex justify-center items-center flex-col">
  <sf-step-progress [current]="5" [total]="6" class="mb-2" />

  <!-- Title -->
  <lib-auth-main-header mainHeader="what is your Goal ? "></lib-auth-main-header>

  <!-- Subtitle -->
  <lib-auth-second-header seconHeader="this helps us create Your personalized plan "></lib-auth-second-header>
  <!-- Form card -->
  <div class="w-full sm:w-full flex flex-col justify-center gap-3 sm:gap-4">


    <!-- Inputs -->
    <div class="flex flex-col gap-3 sm:gap-4 w-full sm:w-3/4 mx-auto">
      @for (goal of goals; track goal) {
      <lib-option-item [label]="goal" [selected]="selectedGoal() === goal" (selectOption)="selectGoal(goal)" />
      }
    </div>

    <div class="flex items-center gap-3 w-3/4 m-auto mt-1">
      <button type="button" (click)="backClicked.emit()"
        class="w-10 h-10 shrink-0 flex items-center justify-center rounded-full border border-white text-white hover:bg-white/10 transition-colors">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
      <sf-button variant="primary" label="Next" type="submit" class="flex-1" [disabled]="!selectedGoal()"
        (click)="nextClicked.emit(selectedGoal()!)" />
    </div>

  </div>
</section>
