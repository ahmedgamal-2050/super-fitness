<section class="age w-[80%] mx-auto flex justify-center items-center flex-col">
  <sf-step-progress [current]="3" [total]="6" class="mb-2" />

  <!-- Title -->
  <lib-auth-main-header mainHeader="what is your weight ? "></lib-auth-main-header>

  <!-- Subtitle -->
  <lib-auth-second-header seconHeader="this helps us create Your personalized plan"></lib-auth-second-header>
  <!-- <lib-wheel-picker
    [start]="30"
    [end]="250"
    [initialValue]="90"
    label="Kg"></lib-wheel-picker> -->
  <sf-wheel class="w-full my-5" [max]="250" [min]="30" [quantity]="'Kg'" [initialValue]="90" />
  <sf-button variant="primary" label="Next" type="submit" class="mt-1 w-3/4 m-auto" (click)="nextClicked.emit()" />
</section>
