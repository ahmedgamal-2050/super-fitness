<section class="text-center age w-[80%] mx-auto flex justify-center items-center flex-col">
  <sf-step-progress [current]="6" [total]="6" class="mb-2" />

  <!-- Title -->
  <lib-auth-main-header mainHeader="your regular physical activity level ? "></lib-auth-main-header>

  <!-- Subtitle -->
  <lib-auth-second-header seconHeader="this helps us create Your personalized plan "></lib-auth-second-header>
  <!-- Form card -->
  <div class="w-full sm:w-full flex flex-col justify-center gap-3 sm:gap-4">


    <!-- Inputs -->
    <div class="flex flex-col gap-3 sm:gap-4 w-full sm:w-3/4 mx-auto">
      @for (physical of physicals; track physical) {
      <lib-option-item [label]="physical" [selected]="selectedPhyscial() === physical"
        (selectOption)="selectPhyscial(physical)" />
      }
    </div>

    <sf-button variant="primary" label="Next" type="submit" class="mt-1 w-3/4 m-auto"
      [disabled]="!selectedPhyscial()" />

  </div>
</section>
