<div class="relative w-full flex items-center">
  <button type="button" (click)="slidePrev()" [disabled]="!showPrev()" class="absolute left-0 z-10 flex items-center justify-center w-8 h-8 rounded-full bg-main text-dark dark:text-white border-2
   border-dark dark:border-white -ms-16 disabled:opacity-50 disabled:cursor-not-allowed!" aria-label="Previous slide">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"
      class="w-4 h-4">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
    </svg>
  </button>

  <div class="m-auto w-full overflow-hidden">
    <swiper-container #swiper init="false">
      @for (tab of tabs(); track tab[tabIdKey()]) {
      <swiper-slide style="width: auto !important;">
        <button (click)="onTabClick(tab)" [class]="
            isSelected(tab)
              ? 'bg-main text-white px-6 py-2 rounded-full font-bold shadow-lg shadow-main/30 whitespace-nowrap cursor-pointer transition-all duration-300'
              : 'text-dark dark:text-white px-6 py-2 rounded-full font-semibold whitespace-nowrap cursor-pointer hover:bg-neutral-200 dark:hover:bg-neutral-800 transition-all duration-300'
          ">
          {{ tab[tabLabelKey()] }}
        </button>
      </swiper-slide>
      }
    </swiper-container>
  </div>

  <button type="button" (click)="slideNext()" [disabled]="!showNext()"
    class="absolute right-0 z-10 flex items-center justify-center w-8 h-8 rounded-full bg-main text-dark dark:text-white border-2 border-dark dark:border-white -me-16 disabled:opacity-50 disabled:cursor-not-allowed!"
    aria-label="Next slide">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"
      class="w-4 h-4">
      <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
    </svg>
  </button>
</div>
