<p-card
  [style]="{ width: '25rem', overflow: 'hidden' }"
  class="bg-white/70! dark:bg-dark/70! backdrop-blur-2xl">
  <ng-template #header>
    <img
      alt="Card"
      class="w-full h-75 object-cover"
      [src]="cardImage() || 'https://primefaces.org/cdn/primeng/images/card-ng.jpg'" />
  </ng-template>

  <ng-template #title>
    <div class="p-4.5 flex flex-col gap-3 text-start">
      <h2 class="text-dark dark:text-light font-bold text-xl">
        {{cardTitle()}}
      </h2>

      <ng-container [ngTemplateOutlet]="cardButton()" />
    </div>
  </ng-template>
</p-card>
