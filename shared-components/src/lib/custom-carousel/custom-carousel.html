<div class="m-auto w-full">
  <swiper-container #swiper init="false">
    @for (card of items(); track $index) {
    <swiper-slide>
      <lib-shared-card
        [cardTitle]="card.title"
        [cardImage]="card.image"
        [cardButton]="cardButton()" />
    </swiper-slide>
    }
  </swiper-container>
</div>
