<div class="w-full  flex flex-col gap-8">
  @if (!showGender) {
  <app-step-personal-info (loginClicked)="showGender = true" />
  } @else if(!showAge) {
  <app-choose-gender (loginClicked)="showAge = true" />
  } @else if (!showWeight) {
  <app-choose-age (nextClicked)="showWeight = true" />
  } @else if (!showHeight){
  <app-choose-weight (nextClicked)="showHeight = true" />
  }
  @else {
  <app-choose-height />
  }
</div>
