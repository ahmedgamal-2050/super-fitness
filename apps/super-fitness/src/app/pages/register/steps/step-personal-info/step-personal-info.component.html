<section class="flex flex-col items-center gap-2">
  <!-- Header text -->
  <p class="text-white font-normal text-base">Hey There</p>
  <p class="text-white font-bold text-2xl mb-4">Create An Account</p>

  <!-- Form card -->
  <div
    class="w-full border border-disabled rounded-[50px] p-8 flex flex-col justify-center gap-4">
    <p class="text-white font-extrabold text-2xl text-center">Register</p>

    <!-- Inputs -->
    <div class="flex flex-col gap-4 w-3/4 mx-auto">
      <sf-input icon="user" placeholder="First Name" />
      <sf-input icon="user" placeholder="Last Name" />
      <sf-input icon="email" placeholder="Email" type="email" />
      <sf-input icon="lock" placeholder="Password" type="password" />
    </div>

    <!-- Forget password -->
    <div class="text-end -mt-1 w-[85%]">
      <button class="text-main text-sm font-semibold hover:underline">
        Forget Password ?
      </button>
    </div>

    <!-- Divider -->
    <div class="flex items-center m-auto gap-3 my-1 w-1/2">
      <span class="flex-1 h-px bg-disabled"></span>
      <span class="text-white text-sm">Or</span>
      <span class="flex-1 h-px bg-disabled"></span>
    </div>

    <!-- Social login -->
    <div class="flex justify-center gap-5">
      <sf-button variant="social" social="facebook" />
      <sf-button variant="social" social="google" />
      <sf-button variant="social" social="apple" />
    </div>

    <!-- Register button -->
    <sf-button
      variant="primary"
      label="Register"
      type="submit"
      class="mt-1 w-3/4 m-auto" />

    <!-- Login link -->
    <p class="text-white text-base font-normal mt-3 text-center">
      Already Have An Account ?
      <button class="text-main font-semibold hover:underline ml-1">
        Login
      </button>
    </p>
  </div>
</section>
