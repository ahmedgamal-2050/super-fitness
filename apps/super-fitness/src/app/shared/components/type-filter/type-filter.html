<div class="flex flex-wrap items-center justify-center gap-6 md:gap-10">
  @for (item of items(); track item.value) {
  <button (click)="onSelect(item.value)" [attr.aria-pressed]="selected() === item.value" [class]="
            selected() === item.value
              ? 'bg-main text-white px-6 py-2 rounded-full font-bold shadow-lg shadow-main/30'
              : 'text-dark dark:text-white px-6 py-2 rounded-full font-semibold'
          ">
    {{ item.label }}
  </button>
  }
</div>
