<main class="w-full mx-auto text-light">
  <header class="mb-8">
    <h1
      class="text-center text-3xl lg:text-[2.75rem] font-extrabold tracking-wide leading-tight">
      create new password
    </h1>
  </header>

  <div
    class="rounded-4xl border border-[#D3D3D3]/70 bg-dark/50 backdrop-blur-sm px-12 py-8 sm:px-10 sm:py-10">
    <h2 class="text-center text-lg font-semibold mb-6">
      make sure its 8 characters or more
    </h2>

    <form
      [formGroup]="resetPasswordForm"
      (ngSubmit)="submitResetPassword()"
      class="flex flex-col gap-y-3">
      <app-custom-form-field>
        <div class="relative">
          <lucide-icon
            [name]="icons.Lock"
            size="16"
            class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-disabled z-10" />

          <app-custom-input
            inputClass="w-full rounded-full text-main focus:border-main border border-[#D3D3D3] bg-[#2f2f2f] py-3.5 pl-12 pr-4 text-light placeholder:text-disabled outline-none"
            formControlName="newPassword"
            type="password"
            placeholder="New Password" />
        </div>

        <app-input-error-message
          [control]="resetPasswordForm.controls.newPassword"
          [messages]="passwordErrorMessages" />
      </app-custom-form-field>

      <app-custom-form-field>
        <div class="relative">
          <lucide-icon
            [name]="icons.Lock"
            size="16"
            class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-disabled z-10" />

          <app-custom-input
            inputClass="w-full rounded-full text-main focus:border-main border border-[#D3D3D3] bg-[#2f2f2f] py-3.5 pl-12 pr-4 text-light placeholder:text-disabled outline-none"
            formControlName="confirmPassword"
            type="password"
            placeholder="Confirm Password" />
        </div>

        <app-input-error-message
          [control]="resetPasswordForm.controls.confirmPassword"
          [messages]="confirmPasswordErrorMessages" />
      </app-custom-form-field>

      <app-custom-button
        type="submit"
        buttonClass="mt-2"
        [disabled]="resetPasswordForm.invalid"
        [loading]="isLoading()">
        Reset Password
      </app-custom-button>

      @if (errorMessage()) {
      <p class="text-center text-sm text-main">{{ errorMessage() }}</p>
      }
    </form>
  </div>
</main>
