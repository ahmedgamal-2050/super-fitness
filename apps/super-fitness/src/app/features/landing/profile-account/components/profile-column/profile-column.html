<div class="flex flex-col items-center text-center">
  <h3 class="text-4xl font-extrabold text-dark dark:text-light capitalize">
    {{ title() }}
  </h3>

  <button
    type="button"
    (click)="onAction()"
    class="text-base font-normal text-dark dark:text-light underline uppercase hover:text-main dark:hover:text-main transition-colors mb-4">
    {{ actionText() }}
  </button>

  <button
    type="button"
    (click)="onAction()"
    class="group flex items-center justify-between w-full max-w-70 bg-main text-dark dark:text-light font-bold rounded-full py-3.5 px-7 border border-dark dark:border-light">
    <span class="text-base tracking-wide">{{ value() }}</span>
    <svg
      lucideRefreshCw
      class="w-5 h-5 shrink-0 group-hover:rotate-180 transition-transform duration-500"
      strokeWidth="2.5"></svg>
  </button>
</div>
