<button
  type="button"
  class="group flex flex-col items-center justify-center p-8 bg-transparent backdrop-blur-md border border-dark dark:border-light rounded-3xl aspect-4/3 sm:aspect-square md:aspect-4/3 lg:aspect-square hover:-translate-y-1 transition-all duration-300 w-full"
  (click)="onCardClick()">
  <!-- Icon Wrapper -->
  <div
    class="p-3.5 rounded-2xl mb-4 group-hover:scale-110 transition-transform duration-300">
    <ng-content select="[icon]" />
  </div>

  <!-- Label -->
  <span
    class="text-lg font-bold tracking-wide text-center"
    [class.text-dark]="!isDestructive()"
    [class.dark:text-light]="!isDestructive()"
    [class.text-red-500]="isDestructive()"
    [class.leading-tight]="subLabel() || isToggle()">
    {{ label() }}
  </span>

  <!-- Sub label (optional) -->
  @if (subLabel()) {
  <span class="text-dark dark:text-light font-bold text-sm mt-1">
    (<span class="text-main font-bold text-sm">{{ subLabel() }}</span>)
  </span>

  }

  <!-- Toggle Switch (optional) -->
  @if (isToggle()) {
  <div
    class="w-12 h-6 bg-dark dark:bg-light rounded-full relative flex items-center p-0.5 transition-colors duration-300 mt-3">
    <div
      class="w-5 h-5 bg-white dark:bg-dark rounded-full shadow-md transition-transform duration-300 transform"
      [class.translate-x-6]="toggleValue()"
      [class.translate-x-0]="!toggleValue()"
      [class.ltr:translate-x-0]="!toggleValue()"
      [class.rtl:translate-x-6]="toggleValue()"></div>
  </div>
  }
</button>
