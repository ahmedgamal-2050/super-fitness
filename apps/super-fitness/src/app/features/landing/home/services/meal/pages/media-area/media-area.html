<div class="relative overflow-hidden rounded-3xl">
  <img [src]="image" [alt]="title" class="h-[500px] w-full object-cover" />

  <div
    class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/40 to-black/20"></div>

  <div
    class="absolute inset-0 flex flex-col justify-end items-center text-center text-white px-8 pb-8">
    @if(showPlayButton){
    <div class="mb-6">
      <div
        class="flex h-20 w-20 items-center justify-center rounded-full bg-orange-600/30 backdrop-blur">
        <div
          class="flex h-14 w-14 items-center justify-center rounded-full bg-orange-500">
          ▶
        </div>
      </div>
    </div>
    }

    <h2 class="mb-4 text-5xl font-bold">{{ title }}</h2>

    <p class="max-w-3xl text-lg text-white/80">{{ shortDescription }}</p>

    <div class="mt-8 flex w-full flex-wrap items-center justify-between gap-4">
      @for(stat of stats; track $index){

      <div
        class="min-w-20 rounded-full border border-white/40 bg-black/20 px-4 py-2 text-center backdrop-blur">
        <p class="text-sm">{{ stat.value }}</p>

        <p class="font-semibold text-[var(--color-main)]">{{ stat.label }}</p>
      </div>

      }
    </div>
  </div>
</div>
