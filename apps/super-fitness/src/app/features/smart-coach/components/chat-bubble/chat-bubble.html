@if (message().sender === 'bot') {
<app-bot-bubble>{{ message().text }}</app-bot-bubble>
} @else {
<div class="flex items-start flex-row-reverse gap-1">
  <div class="size-9 shrink-0 rounded-full bg-main flex items-center justify-center">
    <lucide-icon [name]="icons.User" size="18" class="text-light" />
  </div>
  <div
    class="text-right rounded-tl-[20px] rounded-br-[20px] rounded-bl-[20px] rounded-tr-none bg-[#FF6A0080] backdrop-blur-[15px] shadow-[0_0_10px_rgba(0,0,0,0.25)] p-2 text-sm text-light max-w-[80%] min-w-0 break-words whitespace-pre-wrap ms-auto">
    {{ message().text }}
  </div>
</div>
}
