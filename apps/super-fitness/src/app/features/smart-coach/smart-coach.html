<div class="fixed bottom-6 end-6 z-50 flex flex-col items-end gap-3">
  @if (isOpen()) {
  <div class="m-auto">
    <img src="assets/images/chat_ai.svg" alt="" class="w-[100px] h-[98px]" />

    <button type="button" class="rounded-full bg-main text-white text-sm font-semibold px-4 py-2 shadow-lg"
      (click)="toggle()">
      {{ 'smart_coach_widget_close_label' | transloco }}
    </button>
  </div>

  <div
    class="smart-coach-panel-enter w-[80vw] max-w-[350px] h-[50vh] max-h-[640px] min-h-[420px] rounded-3xl border-2 border-main flex flex-col overflow-hidden shadow-[0px_4px_217.4px_0px_#000000] backdrop-blur-[12.5px] bg-[url('/assets/images/background_ai.png')]">
    <app-smart-coach-panel />
  </div>
  } @else {
  <button type="button" class="flex flex-col items-center w-[136px] h-[136px] drop-shadow-[0_0_64px_#FF4100]"
    (click)="toggle()">
    <img src="assets/images/chat_ai.svg" alt="" class="w-[100.76px] h-[98.29px]" />
    <span
      class="flex items-center justify-center w-full h-[38px] rounded-full bg-main font-baloo font-bold text-[20px] leading-[140%] capitalize text-light">
      {{ 'smart_coach_widget_cta_label' | transloco }}
    </span>
  </button>
  }
</div>
